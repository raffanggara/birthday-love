<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      background: black;
      color: #ff4d6d;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .box {
      max-width: 400px;
      animation: fadeIn 2s;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>❤️</h1>
    <p>
      Selamat ulang tahun yaa sayangg 🥺💖<br><br>
      Semoga kamu selalu bahagia, sehat,  
      dan apa yang mau dicapai cepat tercapai ✨<br><br>
      Aku beruntung banget punya kamu dip, walaupun sudah hatees dek 💌
    </p>
  </div>
</body>
</html>
